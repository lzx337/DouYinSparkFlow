name: 调度 Spark 流

在:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

作业:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 加载 Cookie（优先使用手机文件 → 最后使用 Secrets）
        run: |
          if [ -f .github/cookie_data.json ]; then
            echo "📁 从 cookie_data.json 读取 Cookie"
            {
              echo "COOKIES_DYQIJ1ANHNPE<<EOF"
              cat .github/cookie_data.json
              echo "EOF"
            } >> $GITHUB_ENV
          elif [ -n "${{ secrets.COOKIES_DYQIJ1ANHNPE }}" ]; then
            echo "🔑 从 Secrets 读取 Cookie"
            {
              echo "COOKIES_DYQIJ1ANHNPE<<EOF"
              echo '${{ secrets.COOKIES_DYQIJ1ANHNPE }}'
              echo "EOF"
            } >> $GITHUB_ENV
          else
            echo "❌ 没有找到任何 Cookie 来源！"
            exit 1
          fi

      - name: Setup Python
        使用: actions/setup-python@v5
        with:
          python版本: "3.11"

      - 名称: 安装Chrome
        使用: browser-actions/setup-chrome@v1

      - 名称: 安装依赖项
        run: |
          pip install -r requirements.txt
          playwright install chromium


        env:
          浏览器超时: ${{ 变量.浏览器超时 }}
: ${{ 变量.好友列表等待时间 }}
          语录类型: ${{ 变量.语录类型 }}
: ${{ vars.LOG_LEVEL }}
          匹配模式: ${{ vars.MATCH_MODE }}
: ${{ vars.消息模板 }}
          任务: ${{ 变量.任务 }}
          TASK_RETRY_TIMES: ${{ 变量.TASK_RETRY_TIMES }}
          PROXY_ADDRESS: ${{ 变量.PROXY_ADDRESS }}
        run: python main.py
