name: Schedule Spark Flow

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Load Cookie (手机文件优先 → Secrets 兜底)
        run: |
          if [ -f .github/cookie_data.json ]; then
            echo "从 cookie_data.json 读取 Cookie"
            {
              echo "COOKIES_DYQIJ1ANHNPE<<EOF"
              cat .github/cookie_data.json
              echo "EOF"
            } >> $GITHUB_ENV
          elif [ -n "${{ secrets.COOKIES_DYQIJ1ANHNPE }}" ]; then
            echo "从 Secrets 读取 Cookie"
            {
              echo "COOKIES_DYQIJ1ANHNPE<<EOF"
              echo '${{ secrets.COOKIES_DYQIJ1ANHNPE }}'
              echo "EOF"
            } >> $GITHUB_ENV
          else
            echo "没有找到任何 Cookie 来源！"
            exit 1
          fi

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python版本: "3.11"

      - 名称: 安装Chrome
        使用: browser-actions/setup-chrome@v1

      - 名称: 安装依赖项
        run: |
          pip install -r requirements.txt
          playwright 安装 chromium

      - name: Run task
        环境:
          浏览器超时时间: "${{ vars.BROWSER_TIMEOUT }}"
          好友列表等待时间: "${{ vars.FRIEND_LIST_WAIT_TIME }}"
          HITOKOTO_TYPES: "${{ vars.HITOKOTO_TYPES }}"
          LOG_LEVEL: "${{ vars.LOG_LEVEL }}"
          MATCH_MODE: "${{ vars.MATCH_MODE }}"
          消息模板: "${{ vars.MESSAGE_TEMPLATE }}"
          任务: "${{ vars.TASKS }}"
          任务重试次数: "${{ vars.TASK_RETRY_TIMES }}"
          PROXY_ADDRESS: "${{ vars.PROXY_ADDRESS }}"
        run: python main.py
